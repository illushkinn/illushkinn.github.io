<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="oklch(0.55 0.14 190)"/>
      <stop offset="100%" stop-color="oklch(0.60 0.14 190)"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="oklch(0.55 0.14 190 / 0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="glow2" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="oklch(0.82 0.2 125 / 0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent glow top-right -->
  <ellipse cx="900" cy="100" rx="500" ry="300" fill="url(#glow1)"/>

  <!-- Accent glow bottom-left -->
  <ellipse cx="300" cy="530" rx="400" ry="250" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>

  <!-- Decorative accent circle -->
  <circle cx="960" cy="100" r="4" fill="oklch(0.55 0.14 190 / 0.4)"/>
  <circle cx="980" cy="110" r="2.5" fill="oklch(0.82 0.2 125 / 0.3)"/>
  <circle cx="240" cy="530" r="3" fill="oklch(0.55 0.14 190 / 0.35)"/>

  <!-- Main content -->
  <text x="100" y="220" font-family="'Onest', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#9B9DA0" letter-spacing="3">ILLYA GRYTSYK</text>

  <text x="100" y="330" font-family="'Onest', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="600" fill="#F9F9F9" letter-spacing="-1">WCAG Compliance</text>

  <text x="100" y="400" font-family="'Onest', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="300" fill="#F9F9F9" letter-spacing="-1">
    <tspan fill="url(#accent)">·</tspan> GovTech
  </text>

  <line x1="100" y1="445" x2="400" y2="445" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>

  <text x="100" y="500" font-family="'Onest', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#9B9DA0" letter-spacing="0.5">Clear requirements. No one left behind.</text>

  <!-- Small decorative mark -->
  <rect x="100" y="555" width="32" height="2" rx="1" fill="oklch(0.55 0.14 190 / 0.6)"/>
</svg>
